services:
  postgres:
    image: postgres:16
    container_name: nestjs_starter_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nestjs_starter
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nestjs_starter"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: nestjs_starter_backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/nestjs_starter}
      SEQUELIZE_SYNCHRONIZE: "false"
      JWT_SECRET: ${JWT_SECRET:-change-this-secret}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      REFRESH_TOKEN_DAYS: ${REFRESH_TOKEN_DAYS:-7}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:4201}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4201}
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: nestjs_starter_frontend
    restart: unless-stopped
    ports:
      - "4201:80"
    depends_on:
      - backend

volumes:
  postgres_data:
